services:
  - type: web
    name: blood-donation-api
    runtime: docker
    plan: free
    buildCommand: "echo 'No build required for PHP'"
    startCommand: "php -S 0.0.0.0:$PORT"
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
